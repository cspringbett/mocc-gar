<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOCC GAR Worksheet</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0 1rem 2rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: #f5f5f5;
        color: #111;
      }
      /* CSS variable shim — mirrors Claude's design tokens with plain values */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f0f0f0;
        --color-text-primary: #111111;
        --color-text-secondary: #666666;
        --color-border-tertiary: #e0e0e0;
        --color-border-secondary: #cccccc;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1a1a1a; color: #f0f0f0; }
        :root {
          --color-background-primary: #242424;
          --color-background-secondary: #2e2e2e;
          --color-text-primary: #f0f0f0;
          --color-text-secondary: #aaaaaa;
          --color-border-tertiary: #3a3a3a;
          --color-border-secondary: #4a4a4a;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
